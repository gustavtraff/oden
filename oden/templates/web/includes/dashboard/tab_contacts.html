{#- Tab: Kontakter (contacts) -#}
<div id="tab-contacts" class="tab-content">
    <div class="config-section">
        <div class="flex-header-mb">
            <h3>👥 Kontakter</h3>
            <button type="button" class="btn btn-secondary btn-sm" onclick="refreshContacts()">Uppdatera från Signal</button>
        </div>
        <p class="help-paragraph">
            Kontakter från signal-cli. Används för namnupplösning i rapporter.
        </p>
        <div id="contacts-list">
            <div class="empty-state">Laddar kontakter...</div>
        </div>
    </div>
</div>

{#- Contact edit modal -#}
<div id="contact-edit-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 500px; text-align: left;">
        <div class="flex-header-mb">
            <h3>Redigera kontakt</h3>
            <button class="btn btn-secondary btn-sm" onclick="closeContactEditModal()">✕</button>
        </div>
        <input type="hidden" id="contact-edit-number">

        <div class="form-group">
            <label>Nummer</label>
            <input type="text" id="contact-edit-number-display" disabled style="color: var(--color-text-muted);">
        </div>
        <div class="form-group">
            <label for="contact-edit-given-name">Förnamn</label>
            <input type="text" id="contact-edit-given-name" placeholder="Förnamn">
        </div>
        <div class="form-group">
            <label for="contact-edit-family-name">Efternamn</label>
            <input type="text" id="contact-edit-family-name" placeholder="Efternamn">
        </div>
        <div class="form-group">
            <label for="contact-edit-nick">Smeknamn</label>
            <input type="text" id="contact-edit-nick" placeholder="Smeknamn">
        </div>
        <div class="form-group">
            <label for="contact-edit-note">Anteckning</label>
            <textarea id="contact-edit-note" rows="2" placeholder="Anteckning om kontakten"></textarea>
        </div>
        <div class="form-group">
            <label for="contact-edit-expiration">Försvinnande meddelanden</label>
            <select id="contact-edit-expiration">
                <option value="0">Av</option>
                <option value="3600">1 timme</option>
                <option value="86400">1 dag</option>
                <option value="604800">1 vecka</option>
                <option value="2419200">4 veckor</option>
            </select>
        </div>

        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;">
            <button class="btn btn-secondary" onclick="closeContactEditModal()">Avbryt</button>
            <button class="btn btn-primary" id="contact-edit-save-btn" onclick="saveContactChanges()">Spara</button>
        </div>
        <div id="contact-edit-message" class="message" style="margin-top: 8px;"></div>
    </div>
</div>
